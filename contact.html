<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Contact | Brian Becker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="contact">
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="business.html">Business</a></li>
            <li><a href="med.html">Med</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <header>
        <h1 data-content="contact.header.title">Contact Me</h1>
        <p class="subtitle" data-content="contact.header.subtitle">Let's start a conversation.</p>
    </header>

    <main>
        <section>
            <div class="container">
                <p style="text-align: center; max-width: 600px; margin: 0 auto 30px;" data-content="contact.intro">Get in touch.</p>
                
                <div style="text-align: center; padding: 20px; background-color: var(--section-bg); border-radius: 8px; max-width: 600px; margin: 0 auto;">
                    <p style="font-size: 1.2rem; margin-bottom: 1.5rem;">
                        <strong>Email:</strong><br>
                        <a href="mailto:bbecker@fiu.edu" data-content="contact.emailLink">bbecker@fiu.edu</a>
                    </p>
                    <p style="font-size: 1.2rem;">
                        <strong>Phone:</strong><br>
                        <a href="tel:9545514923" data-content="contact.phoneLink">(954) 551-4923</a>
                    </p>
                </div>

                <div style="margin-top: 4rem;">
                    <h2 style="text-align: center;">Send a Message</h2>
                    <form action="#" method="post">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <div style="text-align: center;">
                            <input type="submit" value="Send Message">
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p data-content="footer.copyright">&copy; 2025 Brian Becker. All Rights Reserved.</p>
        <p><a href="mailto:bbecker@fiu.edu" data-content="footer.emailLink">bbecker@fiu.edu</a></p>
    </footer>
    <script src="js/content.js"></script>
</body>
</html>
