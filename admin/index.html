<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin | Brian Becker</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
    <div id="login-screen" class="admin-login">
        <div class="login-card">
            <h1>Site Admin</h1>
            <p>Enter your password to edit site content.</p>
            <form id="login-form">
                <div class="field-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <p id="login-error" class="hidden" style="color: var(--admin-danger); margin-top: 1rem; font-size: 0.9rem;"></p>
        </div>
    </div>

    <div id="admin-app" class="hidden">
        <header class="admin-header">
            <h1>Site Editor</h1>
            <div class="admin-header-actions">
                <a href="../index.html" target="_blank" class="btn btn-secondary">View Site</a>
                <button id="save-btn" class="btn btn-primary">Save to GitHub</button>
                <button id="logout-btn" class="btn btn-secondary">Log Out</button>
            </div>
        </header>

        <div id="status-bar" class="status-bar"></div>

        <div class="admin-layout">
            <nav class="admin-sidebar" id="nav-tabs">
                <button type="button" data-tab="home" class="active">Home</button>
                <button type="button" data-tab="about">About</button>
                <button type="button" data-tab="med">Publications</button>
                <button type="button" data-tab="business">Business</button>
                <button type="button" data-tab="contact">Contact</button>
                <button type="button" data-tab="settings">Settings</button>
            </nav>

            <div class="admin-editor" id="editor-panel"></div>

            <aside class="admin-preview">
                <h2>Live Preview</h2>
                <div id="preview-panel" class="preview-frame"></div>
            </aside>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
